services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exif-photo-blog-dev
    env_file:
      - .env.local
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_started
    command: sh -c "pnpm install && pnpm exec next dev"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - exif-dev-network
    stdin_open: true
    tty: true

  postgres:
    image: postgres:16-alpine
    container_name: exif-postgres-dev
    env_file:
      - .env.local
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-exif_photo_blog}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - exif-dev-network

  minio:
    image: minio/minio:latest
    container_name: exif-minio-dev
    env_file:
      - .env.local
    command: server /data --console-address ":9001"
    volumes:
      - minio-dev-data:/data
      - ./minio-bucket-policy.json:/tmp/policy.json
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - exif-dev-network

  minio-init:
    image: minio/mc:latest
    container_name: exif-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env.local
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} || true;
      mc mb myminio/photos || true;
      mc anonymous set download myminio/photos || true;
      exit 0;
      "
    networks:
      - exif-dev-network

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: exif-imgproxy-dev
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_ALLOWED_SOURCES: "http://minio:9000/*,http://localhost:9000/*"
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
      IMGPROXY_QUALITY: "75"
    ports:
      - "8080:8080"
    networks:
      - exif-dev-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  exif-dev-network:
    driver: bridge

volumes:
  postgres-dev-data:
  minio-dev-data:
