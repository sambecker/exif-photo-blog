services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exif-photo-blog
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exif-network

  postgres:
    image: postgres:16-alpine
    container_name: exif-postgres
    env_file:
      - .env.production
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-exif_photo_blog}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - exif-network

  redis:
    image: redis:7-alpine
    container_name: exif-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - exif-network

  minio:
    image: minio/minio:latest
    container_name: exif-minio
    env_file:
      - .env.production
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - exif-network

  minio-init:
    image: minio/mc:latest
    container_name: exif-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env.production
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} || true;
      mc mb myminio/photos || true;
      mc anonymous set download myminio/photos || true;
      exit 0;
      "
    networks:
      - exif-network

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: exif-imgproxy
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_ALLOWED_SOURCES: "http://minio:9000/*,https://*"
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
      IMGPROXY_QUALITY: "75"
    ports:
      - "8080:8080"
    networks:
      - exif-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  exif-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
